name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '25'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Run tests
        run: |
          node --test $(find test -name '*.test.js' \
            ! -name 'embeddings.test.js' \
            ! -name 'retrieval-quality.test.js' \
            ! -name 'retrieval-benchmark-audit.test.js' \
            ! -name 'retrieval-query-weighting.test.js' \
            ! -name 'retrieval-routing.test.js' \
            ! -name 'lod-retrieval.test.js' \
            ! -name 'enrich-endpoint.test.js' \
            ! -name 'retrieval.test.js' \
            ! -name 'scope-model.test.js')
        env:
          CI: true